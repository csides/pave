name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Runs the same pre-commit hooks used locally: shellcheck, shfmt, gitleaks
  # (working tree), and the standard hygiene checks.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: pre-commit/action@v3.0.1

  # Full git-history secret scan. We run the binary directly rather than
  # gitleaks-action, which fails on the initial push (it builds a <root>^..HEAD
  # range and the root commit has no parent).
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          version=8.30.1
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | tar -xz -C "$RUNNER_TEMP" gitleaks
      - name: Scan full history for secrets
        run: $RUNNER_TEMP/gitleaks git . --redact --verbose
