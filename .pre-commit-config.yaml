# Pre-commit hooks. These run locally on every commit and the same config runs
# in CI, so local and CI never drift.
#
#   Install once:  pre-commit install --install-hooks
#   Run manually:  pre-commit run --all-files
#   Update pins:   pre-commit autoupdate
#
# `default_install_hook_types` wires up both the pre-commit stage (lint/format/
# secrets) and the commit-msg stage (commitlint) from a single `pre-commit
# install`.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-added-large-files

  # Secret detection — blocks credentials from being committed.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Shell linting.
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Shell formatting (2-space indent, indent switch cases, binary ops on next line).
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: [-w, -s, -i, "2", -ci, -bn]

  # Enforce Conventional Commits on the commit message.
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]
